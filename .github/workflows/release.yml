name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Umożliwia ręczne uruchomienie w zakładce Actions

jobs:
  build:
    runs-on: ubuntu-latest
    # KLUCZOWA POPRAWKA: Nadanie uprawnień do tworzenia wydań (Release)
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # Nie używamy cache, bo nie masz pliku lock

      - name: Install dependencies
        # --no-package-lock zapobiega błędom przy braku pliku lock
        run: npm install --no-package-lock

      - name: Build project
        run: npm run build

      - name: Compress JS file to GZ
        run: |
          # Sprawdź czy folder dist istnieje, jeśli nie - stwórz go (zależy od Twojego buildera)
          mkdir -p dist
          gzip -9 -c dist/wattpilot-card.js > dist/wattpilot-card.js.gz

      - name: Create GitHub Release
        # Ten krok wykona się tylko jeśli wypchniesz TAG (np. v1.0.0)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wattpilot-card.js.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
