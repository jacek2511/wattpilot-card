name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build project
        run: npm run build

      - name: Prepare Assets
        run: |
          # Sprawdź czy plik powstał w dist/. Jeśli Twój build tworzy go gdzie indziej, zmień ścieżkę poniżej.
          # Tworzymy wersję skompresowaną, ale ZACHOWUJEMY oryginał dla HACS
          gzip -9 -c dist/wattpilot-card.js > dist/wattpilot-card.js.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wattpilot-card.js
            dist/wattpilot-card.js.gz
          generate_release_notes: true
                    make_latest: true
          append_body: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
